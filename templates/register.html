<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Nexus Cloud</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" sizes="500×500" href="{{ url_for('static', filename='logo.png') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height: 60px; margin-bottom: 15px;">
                <h2 style="margin: 0; color: var(--accent); font-weight: 600; letter-spacing: 1px;">NEXUS CLOUD</h2>
            </div>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" name="user_id" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>관리자 발급 인증키</label>
                    <input type="text" name="auth_key" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">가입 완료</button>
            </form>
            <div style="margin-top: 25px; text-align: center; font-size: 14px;">
                <a href="{{ url_for('login') }}" style="color: var(--text-secondary); text-decoration: none;">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>
</body>
</html>
